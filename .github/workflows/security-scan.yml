# ──────────────────────────────────────────────────────────────────────────────
# AuditGraph — DevSecOps Security Scanning Pipeline
#
# Triggers: PRs to main/dev, pushes to main/dev, weekly schedule
#
# Stages:
#   1. security-static-analysis   — Bandit (Python) + ESLint security (React)
#   2. dependency-scan            — pip-audit + npm audit
#   3. secret-scan                — Gitleaks
#   4. container-scan             — Trivy on Docker images
#   5. infra-scan                 — Checkov on Bicep IaC
#   6. sbom-generation            — Syft SBOM + license audit
#   7. security-report            — Aggregate results, PR comment, gate
# ──────────────────────────────────────────────────────────────────────────────

name: "Security Scan"

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  schedule:
    # Weekly full scan — Sunday 03:00 UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write        # PR comment with findings
  security-events: write      # SARIF upload to GitHub Security tab
  actions: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1: Static Code Analysis
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  security-static-analysis:
    name: "Static Analysis (Bandit + ESLint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Python: Bandit ──────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Bandit (Python SAST)
        working-directory: ./backend
        run: |
          pip install bandit[toml]
          mkdir -p ../security-reports

          # Run Bandit — JSON for machine parsing, terminal for logs
          bandit -r app/ \
            -f json \
            -o ../security-reports/bandit-results.json \
            --severity-level medium \
            --confidence-level medium \
            -x ./app/tests \
            || true

          # Also generate SARIF for GitHub Security tab
          pip install bandit-sarif-formatter 2>/dev/null || true
          bandit -r app/ \
            -f sarif \
            -o ../security-reports/bandit.sarif \
            --severity-level medium \
            --confidence-level medium \
            -x ./app/tests \
            || true

          # Summary
          echo "### Bandit Results" >> $GITHUB_STEP_SUMMARY
          ISSUES=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('../security-reports/bandit-results.json'))
              results = data.get('results', [])
              high = len([r for r in results if r.get('issue_severity') == 'HIGH'])
              med  = len([r for r in results if r.get('issue_severity') == 'MEDIUM'])
              low  = len([r for r in results if r.get('issue_severity') == 'LOW'])
              print(f'{high} high, {med} medium, {low} low')
              sys.exit(0)
          except Exception as e:
              print(f'Parse error: {e}')
              sys.exit(0)
          ")
          echo "Python SAST: $ISSUES" >> $GITHUB_STEP_SUMMARY

      # ── React: ESLint Security ──────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Run ESLint Security Plugin (React)
        working-directory: ./frontend
        run: |
          npm ci

          # Install security-focused ESLint plugin
          npm install --save-dev \
            eslint \
            eslint-plugin-security \
            @microsoft/eslint-plugin-sdl \
            2>/dev/null || npm install --save-dev eslint eslint-plugin-security

          # Create a security-focused ESLint flat config
          cat > eslint.security.config.mjs << 'ESLINT_CONFIG'
          import security from "eslint-plugin-security";

          export default [
            {
              files: ["src/**/*.{ts,tsx,js,jsx}"],
              plugins: { security },
              rules: {
                "security/detect-object-injection": "warn",
                "security/detect-non-literal-regexp": "warn",
                "security/detect-unsafe-regex": "error",
                "security/detect-buffer-noassert": "error",
                "security/detect-eval-with-expression": "error",
                "security/detect-no-csrf-before-method-override": "error",
                "security/detect-possible-timing-attacks": "warn",
                "security/detect-pseudoRandomBytes": "warn",
                "no-eval": "error",
                "no-implied-eval": "error",
                "no-new-func": "error",
              },
            },
          ];
          ESLINT_CONFIG

          npx eslint \
            --config eslint.security.config.mjs \
            -f json \
            -o ../security-reports/eslint-security.json \
            src/ \
            || true

          # Summary
          ESLINT_COUNT=$(python3 -c "
          import json
          try:
              data = json.load(open('../security-reports/eslint-security.json'))
              total = sum(len(f.get('messages',[])) for f in data)
              errors = sum(1 for f in data for m in f.get('messages',[]) if m.get('severity') == 2)
              warns  = sum(1 for f in data for m in f.get('messages',[]) if m.get('severity') == 1)
              print(f'{errors} errors, {warns} warnings')
          except: print('0 errors, 0 warnings')
          ")
          echo "### ESLint Security" >> $GITHUB_STEP_SUMMARY
          echo "React security lint: $ESLINT_COUNT" >> $GITHUB_STEP_SUMMARY

      - name: Upload SARIF (Bandit)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: security-reports/bandit.sarif
          category: bandit
        continue-on-error: true

      - name: Upload static analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: security-reports/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 2: Dependency Vulnerability Scanning
  # ───────────────────────────────────────────────────────────────────────────
  dependency-scan:
    name: "Dependency Scan (pip-audit + npm audit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip-audit (Python dependencies)
        working-directory: ./backend
        run: |
          pip install pip-audit
          mkdir -p ../security-reports

          pip-audit \
            -r requirements.txt \
            --format json \
            --output ../security-reports/pip-audit.json \
            --desc \
            || true

          # Count and summarize
          python3 << 'PYEOF'
          import json, sys
          try:
              data = json.load(open("../security-reports/pip-audit.json"))
              # pip-audit JSON can be a list of dicts or {"dependencies": [...]}
              vulns = data if isinstance(data, list) else data.get("dependencies", [])
              vuln_pkgs = [v for v in vulns if v.get("vulns")]
              total_vulns = sum(len(v.get("vulns", [])) for v in vuln_pkgs)
              fixable = sum(1 for v in vuln_pkgs if v.get("fix_versions"))
              print(f"Vulnerable packages: {len(vuln_pkgs)}, Total CVEs: {total_vulns}, Fixable: {fixable}")

              with open("../security-reports/pip-audit-summary.txt", "w") as f:
                  f.write(f"vulnerable_packages={len(vuln_pkgs)}\n")
                  f.write(f"total_cves={total_vulns}\n")
                  f.write(f"fixable={fixable}\n")
                  for v in vuln_pkgs:
                      for vuln in v.get("vulns", []):
                          f.write(f"  {v['name']} {v.get('version','?')}: {vuln.get('id','?')} (fix: {vuln.get('fix_versions',[])})\n")
          except Exception as e:
              print(f"pip-audit parse: {e}")
          PYEOF

          echo "### pip-audit" >> $GITHUB_STEP_SUMMARY
          cat ../security-reports/pip-audit-summary.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (Frontend dependencies)
        working-directory: ./frontend
        run: |
          npm ci

          npm audit --json > ../security-reports/npm-audit.json 2>&1 || true

          # Parse and summarize
          python3 << 'PYEOF'
          import json
          try:
              data = json.load(open("../security-reports/npm-audit.json"))
              meta = data.get("metadata", {}).get("vulnerabilities", {})
              critical = meta.get("critical", 0)
              high = meta.get("high", 0)
              moderate = meta.get("moderate", 0)
              low = meta.get("low", 0)
              total = meta.get("total", critical + high + moderate + low)
              summary = f"critical={critical} high={high} moderate={moderate} low={low} total={total}"
              print(summary)
              with open("../security-reports/npm-audit-summary.txt", "w") as f:
                  f.write(summary + "\n")
          except Exception as e:
              print(f"npm audit parse: {e}")
          PYEOF

          echo "### npm audit" >> $GITHUB_STEP_SUMMARY
          cat ../security-reports/npm-audit-summary.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

      - name: Upload dependency scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-reports
          path: security-reports/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 3: Secret Detection
  # ───────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: "Secret Scan (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # Full history for scanning all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: "--report-format json --report-path security-reports/gitleaks.json"
        continue-on-error: true
        id: gitleaks

      - name: Create reports directory
        if: always()
        run: mkdir -p security-reports

      - name: Evaluate Gitleaks results
        if: always()
        run: |
          if [ -f security-reports/gitleaks.json ]; then
            LEAK_COUNT=$(python3 -c "
            import json
            try:
                data = json.load(open('security-reports/gitleaks.json'))
                leaks = data if isinstance(data, list) else data.get('results', [])
                print(len(leaks))
            except: print('0')
            ")
            echo "leaks_found=$LEAK_COUNT" >> $GITHUB_ENV
            echo "### Gitleaks" >> $GITHUB_STEP_SUMMARY
            echo "Secrets detected: $LEAK_COUNT" >> $GITHUB_STEP_SUMMARY

            if [ "$LEAK_COUNT" -gt "0" ]; then
              echo "::error::Gitleaks detected $LEAK_COUNT secret(s) in the repository"
            fi
          else
            echo "leaks_found=0" >> $GITHUB_ENV
            echo "### Gitleaks" >> $GITHUB_STEP_SUMMARY
            echo "No secrets detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-report
          path: security-reports/
          retention-days: 30
          if-no-files-found: ignore

      # Hard gate: fail the pipeline if secrets are found
      - name: Fail on secrets detected
        if: env.leaks_found != '0'
        run: |
          echo "::error::PIPELINE BLOCKED: ${{ env.leaks_found }} secret(s) detected by Gitleaks. Remove secrets and rotate compromised credentials."
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 4: Container Security Scanning
  # ───────────────────────────────────────────────────────────────────────────
  container-scan:
    name: "Container Scan (Trivy)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: backend/Dockerfile
            context: ./backend
            image_name: auditgraph-api
          - dockerfile: Dockerfile.app
            context: .
            image_name: auditgraph-app
          - dockerfile: Dockerfile.admin
            context: .
            image_name: auditgraph-admin
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (${{ matrix.image_name }})
        run: |
          docker build \
            -f ${{ matrix.dockerfile }} \
            -t ${{ matrix.image_name }}:scan \
            ${{ matrix.context }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ matrix.image_name }}:scan"
          format: "json"
          output: "trivy-${{ matrix.image_name }}.json"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"        # Don't fail here — gate in security-report job

      - name: Run Trivy SARIF scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ matrix.image_name }}:scan"
          format: "sarif"
          output: "trivy-${{ matrix.image_name }}.sarif"
          severity: "CRITICAL,HIGH"
        continue-on-error: true

      - name: Trivy summary
        if: always()
        run: |
          echo "### Trivy: ${{ matrix.image_name }}" >> $GITHUB_STEP_SUMMARY
          python3 << 'PYEOF'
          import json
          try:
              data = json.load(open("trivy-${{ matrix.image_name }}.json"))
              results = data.get("Results", [])
              counts = {"CRITICAL": 0, "HIGH": 0, "MEDIUM": 0, "LOW": 0}
              for r in results:
                  for v in r.get("Vulnerabilities", []):
                      sev = v.get("Severity", "UNKNOWN").upper()
                      counts[sev] = counts.get(sev, 0) + 1
              for k, v in counts.items():
                  if v > 0:
                      print(f"  {k}: {v}")
          except Exception as e:
              print(f"  Parse error: {e}")
          PYEOF

      - name: Upload SARIF (Trivy)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-${{ matrix.image_name }}.sarif"
          category: "trivy-${{ matrix.image_name }}"
        continue-on-error: true

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "container-scan-${{ matrix.image_name }}"
          path: "trivy-${{ matrix.image_name }}.json"
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 5: Infrastructure Security (Bicep)
  # ───────────────────────────────────────────────────────────────────────────
  infra-scan:
    name: "Infrastructure Scan (Checkov)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov on Bicep files
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: bicep
          output_format: json
          output_file_path: security-reports/
          soft_fail: true       # Don't block pipeline — report findings

      - name: Checkov summary
        if: always()
        run: |
          mkdir -p security-reports
          echo "### Checkov (Bicep IaC)" >> $GITHUB_STEP_SUMMARY
          if [ -f security-reports/results_json.json ]; then
            python3 << 'PYEOF'
          import json
          try:
              data = json.load(open("security-reports/results_json.json"))
              passed = data.get("summary", {}).get("passed", 0)
              failed = data.get("summary", {}).get("failed", 0)
              skipped = data.get("summary", {}).get("skipped", 0)
              print(f"Passed: {passed}, Failed: {failed}, Skipped: {skipped}")
              if failed > 0:
                  print("\nFailed checks:")
                  for check in data.get("results", {}).get("failed_checks", [])[:10]:
                      print(f"  - {check.get('check_id')}: {check.get('check_result', {}).get('evaluated_keys', [''])[0] if check.get('check_result') else ''} — {check.get('name', '')}")
          except Exception as e:
              print(f"Parse error: {e}")
          PYEOF
          else
            echo "No Checkov results found (Bicep files may not have matching checks)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Checkov reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infra-scan-report
          path: security-reports/
          retention-days: 30
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 6: SBOM Generation + License Audit
  # ───────────────────────────────────────────────────────────────────────────
  sbom-generation:
    name: "SBOM & License Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
        id: syft-install

      - name: Generate SBOM (backend)
        run: |
          mkdir -p security-reports
          syft dir:./backend \
            -o spdx-json=security-reports/sbom-backend.spdx.json \
            -o cyclonedx-json=security-reports/sbom-backend.cdx.json

      - name: Generate SBOM (frontend)
        run: |
          syft dir:./frontend \
            -o spdx-json=security-reports/sbom-frontend.spdx.json \
            -o cyclonedx-json=security-reports/sbom-frontend.cdx.json

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: License compliance check (frontend)
        working-directory: ./frontend
        run: |
          npm ci
          npx license-checker \
            --json \
            --out ../security-reports/licenses-frontend.json \
            || true

          # Flag copyleft / problematic licenses
          python3 << 'PYEOF'
          import json
          RESTRICTED = {"GPL-2.0", "GPL-3.0", "AGPL-3.0", "SSPL-1.0", "EUPL-1.1", "EUPL-1.2",
                        "GPL-2.0-only", "GPL-3.0-only", "AGPL-3.0-only"}
          try:
              data = json.load(open("../security-reports/licenses-frontend.json"))
              flagged = []
              for pkg, info in data.items():
                  lic = info.get("licenses", "")
                  for r in RESTRICTED:
                      if r.lower() in lic.lower():
                          flagged.append(f"{pkg}: {lic}")
                          break
              if flagged:
                  print(f"WARNING: {len(flagged)} packages with restricted licenses:")
                  for f in flagged:
                      print(f"  - {f}")
                  with open("../security-reports/license-flags.txt", "w") as out:
                      out.write("\n".join(flagged))
              else:
                  print("No restricted licenses detected.")
          except Exception as e:
              print(f"License check error: {e}")
          PYEOF

      - name: License compliance check (backend)
        run: |
          pip install pip-licenses
          pip install -r backend/requirements.txt 2>/dev/null || true
          pip-licenses \
            --format json \
            --output-file security-reports/licenses-backend.json \
            || true

          python3 << 'PYEOF'
          import json
          RESTRICTED = {"GPL-2.0", "GPL-3.0", "AGPL-3.0", "SSPL-1.0",
                        "GPL-2.0-only", "GPL-3.0-only", "AGPL-3.0-only"}
          try:
              data = json.load(open("security-reports/licenses-backend.json"))
              flagged = []
              for pkg in data:
                  lic = pkg.get("License", "")
                  for r in RESTRICTED:
                      if r.lower() in lic.lower():
                          flagged.append(f"{pkg.get('Name')}: {lic}")
                          break
              if flagged:
                  print(f"WARNING: {len(flagged)} packages with restricted licenses:")
                  for f in flagged:
                      print(f"  - {f}")
              else:
                  print("No restricted licenses detected in Python deps.")
          except Exception as e:
              print(f"License check error: {e}")
          PYEOF

      - name: SBOM summary
        if: always()
        run: |
          echo "### SBOM & License Audit" >> $GITHUB_STEP_SUMMARY
          echo "Generated SPDX + CycloneDX SBOMs for backend and frontend" >> $GITHUB_STEP_SUMMARY
          if [ -f security-reports/license-flags.txt ]; then
            echo "**License warnings:**" >> $GITHUB_STEP_SUMMARY
            cat security-reports/license-flags.txt >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-and-licenses
          path: security-reports/
          retention-days: 90

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 7: Security Report — Aggregate, Gate, PR Comment
  # ───────────────────────────────────────────────────────────────────────────
  security-report:
    name: "Security Gate & PR Report"
    runs-on: ubuntu-latest
    needs:
      - security-static-analysis
      - dependency-scan
      - secret-scan
      - container-scan
      - infra-scan
      - sbom-generation
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports/

      - name: Aggregate findings & apply security gate
        id: gate
        run: |
          GATE_FAILED=false
          REPORT=""

          REPORT+="## Security Scan Report\n\n"
          REPORT+="| Check | Status | Details |\n"
          REPORT+="|-------|--------|--------|\n"

          # ── Secret scan ─────────────────────────────────────
          SECRET_STATUS="${{ needs.secret-scan.result }}"
          if [ "$SECRET_STATUS" = "failure" ]; then
            REPORT+="| Secrets (Gitleaks) | :red_circle: FAIL | Secrets detected — **pipeline blocked** |\n"
            GATE_FAILED=true
          else
            REPORT+="| Secrets (Gitleaks) | :green_circle: PASS | No secrets detected |\n"
          fi

          # ── Static analysis ─────────────────────────────────
          SAST_STATUS="${{ needs.security-static-analysis.result }}"
          if [ "$SAST_STATUS" = "failure" ]; then
            REPORT+="| Static Analysis | :red_circle: FAIL | Bandit/ESLint errors |\n"
            GATE_FAILED=true
          else
            REPORT+="| Static Analysis | :green_circle: PASS | Bandit + ESLint security |\n"
          fi

          # ── Dependency scan ─────────────────────────────────
          DEP_CRITICAL=0
          DEP_HIGH=0
          if [ -f all-reports/dependency-scan-reports/pip-audit.json ]; then
            DEP_CRITICAL=$(python3 -c "
            import json
            try:
                data = json.load(open('all-reports/dependency-scan-reports/pip-audit.json'))
                vulns = data if isinstance(data, list) else data.get('dependencies', [])
                count = sum(len(v.get('vulns',[])) for v in vulns if v.get('vulns'))
                print(count)
            except: print(0)
            ")
          fi
          if [ -f all-reports/dependency-scan-reports/npm-audit.json ]; then
            NPM_CRIT=$(python3 -c "
            import json
            try:
                data = json.load(open('all-reports/dependency-scan-reports/npm-audit.json'))
                meta = data.get('metadata',{}).get('vulnerabilities',{})
                print(meta.get('critical',0) + meta.get('high',0))
            except: print(0)
            ")
            DEP_HIGH=$((DEP_HIGH + NPM_CRIT))
          fi
          TOTAL_DEP=$((DEP_CRITICAL + DEP_HIGH))
          if [ "$TOTAL_DEP" -gt "0" ]; then
            REPORT+="| Dependencies | :yellow_circle: WARN | $TOTAL_DEP vulnerability/ies found |\n"
          else
            REPORT+="| Dependencies | :green_circle: PASS | No known vulnerabilities |\n"
          fi

          # ── Container scan ──────────────────────────────────
          CONTAINER_STATUS="${{ needs.container-scan.result }}"
          CONTAINER_CRIT=0
          for f in all-reports/container-scan-*/trivy-*.json; do
            if [ -f "$f" ]; then
              COUNT=$(python3 -c "
              import json
              try:
                  data = json.load(open('$f'))
                  results = data.get('Results', [])
                  crit = sum(1 for r in results for v in r.get('Vulnerabilities',[]) if v.get('Severity','').upper() == 'CRITICAL')
                  print(crit)
              except: print(0)
              ")
              CONTAINER_CRIT=$((CONTAINER_CRIT + COUNT))
            fi
          done
          if [ "$CONTAINER_CRIT" -gt "0" ]; then
            REPORT+="| Containers (Trivy) | :red_circle: FAIL | $CONTAINER_CRIT critical CVE(s) in images |\n"
            GATE_FAILED=true
          else
            REPORT+="| Containers (Trivy) | :green_circle: PASS | No critical CVEs |\n"
          fi

          # ── Infra scan ──────────────────────────────────────
          INFRA_STATUS="${{ needs.infra-scan.result }}"
          REPORT+="| Infrastructure (Checkov) | :large_blue_circle: INFO | Bicep scan complete |\n"

          # ── SBOM ────────────────────────────────────────────
          SBOM_STATUS="${{ needs.sbom-generation.result }}"
          if [ "$SBOM_STATUS" = "success" ]; then
            REPORT+="| SBOM & Licenses | :green_circle: PASS | SPDX + CycloneDX generated |\n"
          else
            REPORT+="| SBOM & Licenses | :yellow_circle: WARN | SBOM generation issue |\n"
          fi

          REPORT+="\n"

          # ── Gate decision ───────────────────────────────────
          # Fail on: secrets detected OR critical container CVEs
          # Also fail if high-severity vulns exceed threshold
          TOTAL_HIGH=$((DEP_HIGH + CONTAINER_CRIT))
          if [ "$TOTAL_HIGH" -gt "5" ]; then
            REPORT+="**:stop_sign: Gate FAILED**: >5 high/critical vulnerabilities ($TOTAL_HIGH found)\n"
            GATE_FAILED=true
          fi

          if [ "$GATE_FAILED" = "true" ]; then
            REPORT+="\n> :lock: **Security gate blocked this build.** Fix findings above before merging.\n"
            echo "gate_passed=false" >> $GITHUB_OUTPUT
          else
            REPORT+="\n> :white_check_mark: **All security gates passed.**\n"
            echo "gate_passed=true" >> $GITHUB_OUTPUT
          fi

          # Save report for PR comment
          echo -e "$REPORT" > security-summary.md
          cat security-summary.md >> $GITHUB_STEP_SUMMARY
          cat security-summary.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: security-scan
          path: security-summary.md

      - name: Upload final security summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-summary.md
          retention-days: 30

      - name: Enforce security gate
        if: steps.gate.outputs.gate_passed == 'false'
        run: |
          echo "::error::Security gate FAILED. See scan results above."
          exit 1
