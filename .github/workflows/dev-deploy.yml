name: Deploy AuditGraph DEV

on:
  push:
    branches: [dev]
  workflow_dispatch:

env:
  RG: eus2-ag-nonprod-rg
  ACR: auditgraphcr
  ACR_SERVER: auditgraphcr.azurecr.io
  CAE: dev-cae-ext
  API_APP: auditgraph-api-dev
  CLIENT_APP: auditgraph-app-dev
  ADMIN_APP: auditgraph-admin-dev

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # 1. Security Scan + Guardrail Tests
  # ═══════════════════════════════════════════════════════════════════════════
  test-guardrails:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: auditgraph_test
          POSTGRES_USER: auditgraph
          POSTGRES_PASSWORD: auditgraph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auditgraph"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: pip-audit security scan
        working-directory: ./backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --strict --fix --dry-run 2>&1 \
            || echo "::warning::pip-audit found vulnerabilities"

      - name: Run guardrail tests
        working-directory: ./backend
        env:
          APP_ENV: local
          FLASK_ENV: development
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_NAME: auditgraph_test
          DB_USER: auditgraph
          DB_PASSWORD: auditgraph_test
          DB_ADMIN_USER: auditgraph
          DB_ADMIN_PASSWORD: auditgraph_test
          DB_SSLMODE: disable
          JWT_SECRET: ci-test-secret
          ADMIN_JWT_SECRET: ci-admin-test
          CLIENT_JWT_SECRET: ci-client-test
          ENFORCE_ADMIN_GUARD: 'false'
        run: |
          PYTHONPATH=. python tests/test_production_guardrails.py
          PYTHONPATH=. python tests/test_isolation_stress.py

  # ═══════════════════════════════════════════════════════════════════════════
  # 2. Build & Push Images (parallel)
  # ═══════════════════════════════════════════════════════════════════════════
  build-api:
    runs-on: ubuntu-latest
    needs: [test-guardrails]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Build & push API image
        run: |
          az acr build \
            --registry ${{ env.ACR }} \
            --platform linux/amd64 \
            --image auditgraph-api:${{ github.sha }} \
            --image auditgraph-api:dev \
            --file Dockerfile.api \
            .

  build-app:
    runs-on: ubuntu-latest
    needs: [test-guardrails]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Build & push client app image
        run: |
          az acr build \
            --registry ${{ env.ACR }} \
            --platform linux/amd64 \
            --image auditgraph-app:${{ github.sha }} \
            --image auditgraph-app:dev \
            --file Dockerfile.app \
            --build-arg REACT_APP_API_URL=https://dev.api.auditgraph.ai \
            .

  build-admin:
    runs-on: ubuntu-latest
    needs: [test-guardrails]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Build & push admin image
        run: |
          az acr build \
            --registry ${{ env.ACR }} \
            --platform linux/amd64 \
            --image auditgraph-admin:${{ github.sha }} \
            --image auditgraph-admin:dev \
            --file Dockerfile.admin \
            --build-arg REACT_APP_API_URL=https://dev.api.auditgraph.ai \
            .

  # ═══════════════════════════════════════════════════════════════════════════
  # 3-5. Deploy Infrastructure + Container Apps
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-app, build-admin]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Enable ACR admin & fetch credentials
        id: acr-creds
        run: |
          az acr update --name ${{ env.ACR }} --admin-enabled true --output none
          ACR_USERNAME=$(az acr credential show --name ${{ env.ACR }} --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name ${{ env.ACR }} --query "passwords[0].value" -o tsv)
          echo "::add-mask::$ACR_PASSWORD"
          echo "acr-username=$ACR_USERNAME" >> "$GITHUB_OUTPUT"
          echo "acr-password=$ACR_PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Deploy Bicep infrastructure
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RG }}
          template: ./infra/containerapps-dev.bicep
          parameters: >-
            environmentName=${{ env.CAE }}
            acrLoginServer=${{ env.ACR_SERVER }}
            acrUsername=${{ steps.acr-creds.outputs.acr-username }}
            acrPassword=${{ steps.acr-creds.outputs.acr-password }}
            apiImageTag=${{ github.sha }}
            appImageTag=${{ github.sha }}
            adminImageTag=${{ github.sha }}
            dbHost=${{ vars.DEV_DB_HOST }}
            dbName=${{ vars.DEV_DB_NAME }}
            dbUser=${{ secrets.DEV_DB_USER }}
            dbPassword=${{ secrets.DEV_DB_PASSWORD }}
            dbAdminUser=${{ secrets.DEV_DB_ADMIN_USER }}
            dbAdminPassword=${{ secrets.DEV_DB_ADMIN_PASSWORD }}
            jwtSecret=${{ secrets.DEV_JWT_SECRET }}
            adminJwtSecret=${{ secrets.DEV_ADMIN_JWT_SECRET }}
            clientJwtSecret=${{ secrets.DEV_CLIENT_JWT_SECRET }}
            adminPassword=${{ secrets.DEV_ADMIN_PASSWORD }}

      - name: Wait for container apps to be running
        run: |
          echo "Checking container app revision status (internal CAE — no public HTTP access)..."
          for APP_NAME in ${{ env.API_APP }} ${{ env.CLIENT_APP }} ${{ env.ADMIN_APP }}; do
            echo ""
            echo "=== $APP_NAME ==="
            for i in $(seq 1 24); do
              STATE=$(az containerapp revision list \
                -n "$APP_NAME" -g ${{ env.RG }} \
                --query "[0].properties.runningState" -o tsv 2>/dev/null || echo "Unknown")
              HEALTH=$(az containerapp revision list \
                -n "$APP_NAME" -g ${{ env.RG }} \
                --query "[0].properties.healthState" -o tsv 2>/dev/null || echo "Unknown")
              echo "  Attempt $i: runningState=$STATE healthState=$HEALTH"
              if [ "$STATE" = "Running" ] && [ "$HEALTH" = "Healthy" ]; then
                echo "  ✓ $APP_NAME is running and healthy"
                break
              fi
              if [ "$STATE" = "Failed" ] || [ "$STATE" = "Stopped" ]; then
                echo "::error::$APP_NAME revision failed (state: $STATE)"
                az containerapp logs show -n "$APP_NAME" -g ${{ env.RG }} --tail 20 2>/dev/null || true
                exit 1
              fi
              if [ "$i" = "24" ]; then
                echo "::error::$APP_NAME not ready after 120s (state: $STATE, health: $HEALTH)"
                az containerapp logs show -n "$APP_NAME" -g ${{ env.RG }} --tail 20 2>/dev/null || true
                exit 1
              fi
              sleep 5
            done
          done

          echo ""
          echo "=== Container App FQDNs ==="
          az containerapp show -n ${{ env.API_APP }} -g ${{ env.RG }} \
            --query "{app:name, fqdn:properties.configuration.ingress.fqdn}" -o table
          az containerapp show -n ${{ env.CLIENT_APP }} -g ${{ env.RG }} \
            --query "{app:name, fqdn:properties.configuration.ingress.fqdn}" -o table
          az containerapp show -n ${{ env.ADMIN_APP }} -g ${{ env.RG }} \
            --query "{app:name, fqdn:properties.configuration.ingress.fqdn}" -o table

  # ═══════════════════════════════════════════════════════════════════════════
  # 6. Final Status
  # ═══════════════════════════════════════════════════════════════════════════
  # NOTE: Database bootstrap (migrations + demo seed) must be run from within
  # the VNet since the PostgreSQL server has public access disabled.
  # Run manually: ./scripts/deploy-dev.sh --skip-build --skip-domains
  # Or: az containerapp exec -n auditgraph-api-dev -g eus2-ag-nonprod-rg --command "python -m app.main"
  summary:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo ""
          echo "═══════════════════════════════════════════════"
          echo "AuditGraph DEV Environment Ready"
          echo "═══════════════════════════════════════════════"
          echo ""
          echo "https://dev.api.auditgraph.ai"
          echo "https://dev.app.auditgraph.ai"
          echo "https://dev.admin.auditgraph.ai"
          echo "https://demo.auditgraph.ai"
          echo ""
