name: Deploy Frontend

on:
  push:
    branches: [dev]
    paths:
      - 'frontend/**'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: app-auditgraph-web
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app
        working-directory: frontend
        run: npm run build
        env:
          CI: false

      - name: Create deployment package
        working-directory: frontend
        run: |
          mkdir -p deploy

          # Copy pre-built React app and Express server
          cp -r build deploy/build
          cp startup.js deploy/

          # Create a minimal package.json for deployment (no build script)
          # This prevents Azure Oryx from trying to rebuild React
          node -e "
            const pkg = require('./package.json');
            const deployPkg = {
              name: pkg.name,
              version: pkg.version,
              private: true,
              scripts: { start: 'node startup.js' },
              dependencies: {
                express: pkg.dependencies.express,
                'http-proxy-middleware': pkg.dependencies['http-proxy-middleware']
              }
            };
            require('fs').writeFileSync('deploy/package.json', JSON.stringify(deployPkg, null, 2));
          "

          cd deploy
          npm install --production
          zip -r ../../frontend-deploy.zip .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: frontend-deploy.zip
