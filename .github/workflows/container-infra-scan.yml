# ──────────────────────────────────────────────────────────────────────────────
# AuditGraph — Container & Infrastructure Scan (slow — weekly + pre-deploy)
#
# NOT part of the PR gate. Runs on:
#   - Weekly schedule (Sunday 03:00 UTC)
#   - Manual trigger before deployments (workflow_dispatch)
#
# Stages:
#   1. Container Scan    — Trivy on Docker images (api, app, admin)
#   2. Infrastructure    — Checkov on Bicep IaC
#   3. SBOM & Licenses   — Syft SBOM + license compliance audit
#   4. Report            — Aggregate and upload findings
# ──────────────────────────────────────────────────────────────────────────────

name: "Container & Infra Scan"

on:
  schedule:
    # Weekly — Sunday 03:00 UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: container-infra-scan
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # 1. Container Security Scanning (Trivy)
  # ───────────────────────────────────────────────────────────────────────────
  container-scan:
    name: "Container Scan (Trivy)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: backend/Dockerfile
            context: ./backend
            image_name: auditgraph-api
          - dockerfile: Dockerfile.app
            context: .
            image_name: auditgraph-app
          - dockerfile: Dockerfile.admin
            context: .
            image_name: auditgraph-admin
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (${{ matrix.image_name }})
        run: |
          docker build \
            -f ${{ matrix.dockerfile }} \
            -t ${{ matrix.image_name }}:scan \
            ${{ matrix.context }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "${{ matrix.image_name }}:scan"
          format: "json"
          output: "trivy-${{ matrix.image_name }}.json"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"

      - name: Run Trivy SARIF scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "${{ matrix.image_name }}:scan"
          format: "sarif"
          output: "trivy-${{ matrix.image_name }}.sarif"
          severity: "CRITICAL,HIGH"
        continue-on-error: true

      - name: Trivy summary
        if: always()
        run: |
          echo "### Trivy: ${{ matrix.image_name }}" >> $GITHUB_STEP_SUMMARY
          python3 << 'PYEOF'
          import json
          try:
              data = json.load(open("trivy-${{ matrix.image_name }}.json"))
              results = data.get("Results", [])
              counts = {"CRITICAL": 0, "HIGH": 0, "MEDIUM": 0, "LOW": 0}
              for r in results:
                  for v in r.get("Vulnerabilities", []):
                      sev = v.get("Severity", "UNKNOWN").upper()
                      counts[sev] = counts.get(sev, 0) + 1
              for k, v in counts.items():
                  if v > 0:
                      print(f"  {k}: {v}")
              if all(v == 0 for v in counts.values()):
                  print("  No vulnerabilities found")
          except Exception as e:
              print(f"  Parse error: {e}")
          PYEOF

      - name: Upload SARIF (Trivy)
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-${{ matrix.image_name }}.sarif"
          category: "trivy-${{ matrix.image_name }}"
        continue-on-error: true

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "container-scan-${{ matrix.image_name }}"
          path: "trivy-${{ matrix.image_name }}.json"
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # 2. Infrastructure Security (Checkov on Bicep)
  # ───────────────────────────────────────────────────────────────────────────
  infra-scan:
    name: "Infrastructure Scan (Checkov)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov on Bicep files
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: bicep
          output_format: json
          output_file_path: security-reports/
          soft_fail: true

      - name: Checkov summary
        if: always()
        run: |
          mkdir -p security-reports
          echo "### Checkov (Bicep IaC)" >> $GITHUB_STEP_SUMMARY
          if [ -f security-reports/results_json.json ]; then
            python3 << 'PYEOF'
          import json
          try:
              data = json.load(open("security-reports/results_json.json"))
              passed = data.get("summary", {}).get("passed", 0)
              failed = data.get("summary", {}).get("failed", 0)
              skipped = data.get("summary", {}).get("skipped", 0)
              print(f"Passed: {passed}, Failed: {failed}, Skipped: {skipped}")
              if failed > 0:
                  print("\nFailed checks:")
                  for check in data.get("results", {}).get("failed_checks", [])[:10]:
                      print(f"  - {check.get('check_id')}: {check.get('name', '')}")
          except Exception as e:
              print(f"Parse error: {e}")
          PYEOF
          else
            echo "No Checkov results found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Checkov reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infra-scan-report
          path: security-reports/
          retention-days: 30
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────────────────
  # 3. SBOM Generation + License Audit
  # ───────────────────────────────────────────────────────────────────────────
  sbom-generation:
    name: "SBOM & License Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
        id: syft-install

      - name: Generate SBOM (backend)
        run: |
          mkdir -p security-reports
          syft dir:./backend \
            -o spdx-json=security-reports/sbom-backend.spdx.json \
            -o cyclonedx-json=security-reports/sbom-backend.cdx.json

      - name: Generate SBOM (frontend)
        run: |
          syft dir:./frontend \
            -o spdx-json=security-reports/sbom-frontend.spdx.json \
            -o cyclonedx-json=security-reports/sbom-frontend.cdx.json

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: License compliance check (frontend)
        working-directory: ./frontend
        run: |
          npm ci
          npx license-checker \
            --json \
            --out ../security-reports/licenses-frontend.json \
            || true

          python3 << 'PYEOF'
          import json
          RESTRICTED = {"GPL-2.0", "GPL-3.0", "AGPL-3.0", "SSPL-1.0", "EUPL-1.1", "EUPL-1.2",
                        "GPL-2.0-only", "GPL-3.0-only", "AGPL-3.0-only"}
          try:
              data = json.load(open("../security-reports/licenses-frontend.json"))
              flagged = []
              for pkg, info in data.items():
                  lic = info.get("licenses", "")
                  for r in RESTRICTED:
                      if r.lower() in lic.lower():
                          flagged.append(f"{pkg}: {lic}")
                          break
              if flagged:
                  print(f"WARNING: {len(flagged)} packages with restricted licenses:")
                  for f in flagged:
                      print(f"  - {f}")
              else:
                  print("No restricted licenses detected.")
          except Exception as e:
              print(f"License check error: {e}")
          PYEOF

      - name: License compliance check (backend)
        run: |
          pip install pip-licenses
          pip install -r backend/requirements.txt 2>/dev/null || true
          pip-licenses \
            --format json \
            --output-file security-reports/licenses-backend.json \
            || true

          python3 << 'PYEOF'
          import json
          RESTRICTED = {"GPL-2.0", "GPL-3.0", "AGPL-3.0", "SSPL-1.0",
                        "GPL-2.0-only", "GPL-3.0-only", "AGPL-3.0-only"}
          try:
              data = json.load(open("security-reports/licenses-backend.json"))
              flagged = []
              for pkg in data:
                  lic = pkg.get("License", "")
                  for r in RESTRICTED:
                      if r.lower() in lic.lower():
                          flagged.append(f"{pkg.get('Name')}: {lic}")
                          break
              if flagged:
                  print(f"WARNING: {len(flagged)} packages with restricted licenses:")
                  for f in flagged:
                      print(f"  - {f}")
              else:
                  print("No restricted licenses detected in Python deps.")
          except Exception as e:
              print(f"License check error: {e}")
          PYEOF

      - name: SBOM summary
        if: always()
        run: |
          echo "### SBOM & License Audit" >> $GITHUB_STEP_SUMMARY
          echo "Generated SPDX + CycloneDX SBOMs for backend and frontend" >> $GITHUB_STEP_SUMMARY
          if [ -f security-reports/license-flags.txt ]; then
            echo "**License warnings:**" >> $GITHUB_STEP_SUMMARY
            cat security-reports/license-flags.txt >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-and-licenses
          path: security-reports/
          retention-days: 90

  # ───────────────────────────────────────────────────────────────────────────
  # 4. Report Summary
  # ───────────────────────────────────────────────────────────────────────────
  scan-report:
    name: "Scan Report"
    runs-on: ubuntu-latest
    needs: [container-scan, infra-scan, sbom-generation]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Container & Infrastructure Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          CONTAINER="${{ needs.container-scan.result }}"
          INFRA="${{ needs.infra-scan.result }}"
          SBOM="${{ needs.sbom-generation.result }}"

          [ "$CONTAINER" = "success" ] && echo "| Container Scan (Trivy) | :white_check_mark: Pass |" >> $GITHUB_STEP_SUMMARY || echo "| Container Scan (Trivy) | :yellow_circle: $CONTAINER |" >> $GITHUB_STEP_SUMMARY
          [ "$INFRA" = "success" ] && echo "| Infrastructure (Checkov) | :white_check_mark: Pass |" >> $GITHUB_STEP_SUMMARY || echo "| Infrastructure (Checkov) | :yellow_circle: $INFRA |" >> $GITHUB_STEP_SUMMARY
          [ "$SBOM" = "success" ] && echo "| SBOM & Licenses | :white_check_mark: Pass |" >> $GITHUB_STEP_SUMMARY || echo "| SBOM & Licenses | :yellow_circle: $SBOM |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> This scan runs weekly and before manual deployments. It is **not** a PR blocker." >> $GITHUB_STEP_SUMMARY
