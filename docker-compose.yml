services:
  # ─── PostgreSQL — local development database ─────────────
  auditgraph-postgres:
    image: postgres:16
    container_name: auditgraph-postgres
    environment:
      POSTGRES_DB: auditgraph
      POSTGRES_USER: auditgraph
      POSTGRES_PASSWORD: auditgraph
    ports:
      - "5434:5432"
    volumes:
      - auditgraph_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auditgraph_app"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - auditgraph-net

  # ─── Backend (Flask API) ───────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env.local
    environment:
      - FLASK_APP=app.main:create_app()
      - FLASK_ENV=development
      - APP_ENV=local
      - DATABASE_URL=postgresql://auditgraph:auditgraph@auditgraph-postgres:5432/auditgraph
    volumes:
      # Mount source code for hot reload in development
      - ./backend:/app
    command: ["python", "-m", "flask", "run", "--host=0.0.0.0", "--port=5000", "--reload"]
    depends_on:
      auditgraph-postgres:
        condition: service_healthy
    networks:
      - auditgraph-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Frontend (React + Nginx) ──────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # Override prod nginx config with local dev config (has backend proxy)
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - auditgraph-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  auditgraph-net:
    driver: bridge

volumes:
  auditgraph_pgdata:
